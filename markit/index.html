<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkiT — India's Smartest Stock Tracker</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📈</text></svg>">
</head>
<body>

<!-- ===== SIDEBAR OVERLAY ===== -->
<div class="sidebar-overlay"></div>

<!-- ===== APP LAYOUT ===== -->
<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-wrap"></div>
      <div class="logo-text">Mark<span>iT</span></div>
      <div class="logo-sub">Smart Markets</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>

      <button class="nav-item" data-page="dashboard">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </button>

      <button class="nav-item" data-page="markets">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>
        Markets
      </button>

      <button class="nav-item" data-page="watchlist">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
        Watchlist
      </button>

      <div class="nav-section-label" style="margin-top:8px">Tools</div>

      <button class="nav-item" data-page="advisor">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        AI Advisor
      </button>

      <div class="nav-section-label" style="margin-top:8px">Account</div>

      <button class="nav-item" data-page="settings">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </button>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-pill" onclick="navigateTo('settings')">
        <div class="user-avatar" id="sidebar-user-avatar">?</div>
        <div>
          <div class="user-name" id="sidebar-user-name">Guest User</div>
          <div class="user-plan" id="sidebar-user-plan">Not logged in</div>
        </div>
      </div>
      <button id="sidebar-auth-btn"
        onclick="state.user ? navigateTo('settings') : showAuthModal('login')"
        style="width:100%;margin-top:8px;padding:9px;border-radius:8px;border:1px solid rgba(201,168,76,0.3);
               background:rgba(201,168,76,0.08);color:var(--gold);font-size:12px;font-weight:600;
               cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;transition:all 0.2s">
        Login / Sign Up
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main-content">

    <!-- TICKER -->
    <div class="ticker-bar">
      <div class="ticker-track" id="ticker-track">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <div class="search-bar">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search stocks… (e.g. RELIANCE, TCS)" autocomplete="off">
        <div class="search-results-dropdown" id="search-dropdown"></div>
      </div>

      <div class="topbar-right">
        <!-- Exchange Filter -->
        <button class="exchange-badge active" data-ex="ALL" onclick="setExchange('ALL')">ALL</button>
        <button class="exchange-badge" data-ex="NSE" onclick="setExchange('NSE')">NSE</button>
        <button class="exchange-badge" data-ex="BSE" onclick="setExchange('BSE')">BSE</button>

        <!-- Theme toggle quick button -->
        <button class="icon-btn" onclick="applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')" title="Toggle Theme">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <!-- Notifications -->
        <button class="icon-btn" onclick="showToast('No new notifications')" title="Notifications">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== PAGE CONTENT ===== -->
    <main class="page-content">

      <!-- DASHBOARD PAGE -->
      <div id="page-dashboard" class="page active">
        <!-- Rendered by JS -->
      </div>

      <!-- MARKETS PAGE -->
      <div id="page-markets" class="page">
        <!-- Rendered by JS -->
      </div>

      <!-- WATCHLIST PAGE -->
      <div id="page-watchlist" class="page">
        <!-- Rendered by JS -->
      </div>

      <!-- STOCK DETAIL PAGE -->
      <div id="page-stock-detail" class="page">
        <!-- Rendered by JS -->
      </div>

      <!-- ADVISOR PAGE -->
      <div id="page-advisor" class="page">
        <!-- Rendered by JS -->
      </div>

      <!-- SETTINGS PAGE -->
      <div id="page-settings" class="page">
        <!-- Rendered by JS -->
      </div>

    </main>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
